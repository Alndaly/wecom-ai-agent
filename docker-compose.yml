# Dev stack.
#
# - core    : postgres + redis + backend + web   (always up)
# - rag     : milvus standalone + neo4j          (profile=rag)
# - all     : everything                          (profile=rag)
#
# Examples:
#   docker compose up backend web                       # MVP1/2/3 with in-memory RAG
#   docker compose --profile rag up                     # full stack incl. Milvus & Neo4j
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wecom
      POSTGRES_USER: wecom
      POSTGRES_PASSWORD: wecom
    ports: ["5432:5432"]
    volumes: ["pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wecom -d wecom"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Default to Postgres when running via compose; the backend's alembic
      # migrations run on startup so the schema is always in sync. To run
      # purely against SQLite for an offline dev session set
      #   DATABASE_URL=sqlite+aiosqlite:///./dev.db
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wecom:wecom@postgres:5432/wecom}
      JWT_SECRET: dev-secret-change-me
      CORS_ORIGINS: http://localhost:3000
      # rag profile defaults — override per-env / via /settings UI for LLM keys
      VECTOR_STORE: ${VECTOR_STORE:-memory}
      MILVUS_URI:   ${MILVUS_URI:-http://milvus:19530}
      GRAPH_STORE:  ${GRAPH_STORE:-memory}
      NEO4J_URI:    ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER:   ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jtest}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TASK_EXECUTOR_BASE_URL: http://backend:8000
      TASK_EXECUTOR_SECRET: ${TASK_EXECUTOR_SECRET:-dev-task-executor-secret}
    ports: ["8000:8000"]
    volumes: ["./backend:/app"]
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: ./backend
    depends_on:
      - redis
      - backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wecom:wecom@postgres:5432/wecom}
      JWT_SECRET: dev-secret-change-me
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TASK_EXECUTOR_BASE_URL: http://backend:8000
      TASK_EXECUTOR_SECRET: ${TASK_EXECUTOR_SECRET:-dev-task-executor-secret}
    volumes: ["./backend:/app"]
    working_dir: /app
    command: celery -A app.worker.celery_app worker -Q device_tasks --loglevel=INFO --concurrency=8 --prefetch-multiplier=1

  web:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_WS_BASE: ws://localhost:8000
    ports: ["3000:3000"]
    volumes: ["./web:/app"]
    command: sh -c "npm install && npm run dev"

  # ----- RAG profile -----
  etcd:
    profiles: ["rag"]
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes: ["etcd:/etcd"]

  minio:
    profiles: ["rag"]
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data
    volumes: ["minio:/minio_data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30

  milvus:
    profiles: ["rag"]
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports: ["19530:19530", "9091:9091"]
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    volumes: ["milvus:/var/lib/milvus"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30

  neo4j:
    profiles: ["rag"]
    image: neo4j:5.22-community
    environment:
      NEO4J_AUTH: neo4j/neo4jtest
      NEO4J_server_default__listen__address: 0.0.0.0
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4jtest", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  pg:
  etcd:
  minio:
  milvus:
  neo4j_data:
