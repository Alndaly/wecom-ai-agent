; Alembic configuration.
;
; sqlalchemy.url is intentionally blank — env.py reads DATABASE_URL from
; app settings and converts an async URL (sqlite+aiosqlite / postgresql+asyncpg)
; to its sync equivalent at runtime. This keeps a single source of truth.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# leave empty; resolved by env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
